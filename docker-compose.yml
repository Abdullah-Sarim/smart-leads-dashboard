version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: leads_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: leaddashboard
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - leads-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: leads_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/leaddashboard
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BCRYPT_SALT: ${BCRYPT_SALT:-12}
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    networks:
      - leads-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leads_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      VITE_API_URL: /api
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - leads-network

volumes:
  mongo_data:

networks:
  leads-network:
    driver: bridge